<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NoPrime Options</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 15px;
      color: #1a1a1a;
      background: #f5f5f5;
      padding: 24px;
      min-width: 360px;
    }
    h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 20px;
    }
    .option-group {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .option-group label {
      display: block;
      font-weight: 500;
      margin-bottom: 8px;
    }
    .option-group p {
      font-size: 13px;
      color: #666;
      margin-bottom: 12px;
    }
    select {
      font-size: 14px;
      padding: 6px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      width: 100%;
      max-width: 280px;
    }
    .saved {
      display: inline-block;
      margin-left: 10px;
      color: #2e7d32;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .saved.show { opacity: 1; }
  </style>
</head>
<body>
  <h1>NoPrime Options</h1>

  <div class="option-group">
    <label for="search-engine">Preferred Search Engine</label>
    <p>Used for "Search online" links when a brand's store isn't known, and as a secondary option on matched brands.</p>
    <select id="search-engine">
      <option value="duckduckgo">DuckDuckGo</option>
      <option value="google">Google</option>
      <option value="bing">Bing</option>
      <option value="brave">Brave Search</option>
      <option value="startpage">Startpage</option>
      <option value="ecosia">Ecosia</option>
    </select>
    <span class="saved" id="saved-msg">✓ Saved</span>
  </div>

  <script src="src/options.js"></script>
</body>
</html>
